<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dover 2026: De Ultieme Check</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    .progress-bar-fill { transition: width 0.4s ease-out; }
    #scroll-container { scrollbar-width: none; -ms-overflow-style: none; }
    #scroll-container::-webkit-scrollbar { display: none; }
    .animate-ride-across { animation: rideAcross 5s linear forwards; }
    @keyframes rideAcross { 0% { transform: translateX(-100vw); } 100% { transform: translateX(100vw); } }
  </style>
</head>
<body class="flex justify-center items-center bg-gradient-to-br from-blue-100 via-indigo-50 to-purple-100">

  <div id="spiek-modal" class="hidden fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-sm flex justify-center items-center p-4">
    <div class="bg-white rounded-2xl max-w-4xl w-full h-[85vh] flex flex-col overflow-hidden shadow-2xl border-4 border-indigo-500">
       <div class="p-4 bg-slate-800 text-white flex justify-between items-center">
          <h3 class="font-black text-yellow-400">🚲 Technisch Dossier</h3>
          <button onclick="toggleSpiekbriefje()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold">Sluiten ❌</button>
       </div>
       <div class="overflow-auto p-4 bg-slate-100 flex-grow flex justify-center">
          <img src="de-onderdelen-van-de-fiets-afbeelding-21.png" class="max-w-full h-auto rounded-xl shadow-lg border-2 border-white" onerror="this.outerHTML='<p class=\'p-10 font-bold text-red-500\'>Foto niet gevonden.</p>'">
       </div>
    </div>
  </div>

  <div class="w-full max-w-3xl h-full sm:h-[95vh] sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 relative bg-slate-50/95">
    
    <div id="start-scherm" class="flex-grow flex flex-col h-full p-8 text-center items-center justify-center">
        <div class="text-7xl mb-6">🚴‍♂️</div>
        <h1 class="text-4xl font-black text-slate-800 mb-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-transparent bg-clip-text uppercase italic leading-none">Roadtrip Dover 2026</h1>
        <p class="text-slate-500 mb-8 font-bold italic">Halen jullie de overkant zonder kleerscheuren?</p>
        <button onclick="startSpel()" class="bg-indigo-600 text-white font-black py-4 px-12 rounded-full shadow-lg uppercase tracking-widest hover:scale-105 transition-transform text-xl">Start de Tocht!</button>
    </div>

    <div id="etappe-scherm" class="hidden absolute inset-0 z-50 bg-slate-900/95 flex flex-col justify-center items-center text-center p-6">
      <h2 class="text-5xl font-black text-white mb-2 italic">Grensovergang!</h2>
      <p class="text-2xl text-yellow-400 mb-10" id="volgende-land-naam">Volgende Etappe</p>
      <div class="w-full overflow-hidden relative h-24 mb-10"><div class="text-7xl absolute bottom-0 left-0 animate-ride-across">🚴‍♂️💨</div></div>
      <button onclick="startVolgendeEtappe()" class="bg-white text-slate-900 font-black py-5 px-12 rounded-full shadow-2xl uppercase text-xl">Doorrijden 🏁</button>
    </div>

    <div id="game-ui" class="hidden flex-col h-full w-full">
      <div id="game-header" class="p-3 text-white flex flex-col gap-2 shrink-0 bg-slate-800">
        <div class="flex justify-between items-center px-1">
          <div class="flex items-center space-x-2"><span id="land-icoon" class="text-3xl">🛠️</span><span class="font-black text-sm uppercase" id="land-naam">Voorbereiding</span></div>
          <div class="flex items-center space-x-3">
            <button onclick="toggleSpiekbriefje()" class="bg-yellow-400 text-slate-900 px-3 py-1 rounded-lg font-black text-xs border-2 border-slate-900">SPIEKBRIEFJE 🧐</button>
            <div class="bg-black/20 px-3 py-1 rounded-lg font-black text-yellow-300" id="score-weergave">0</div>
          </div>
        </div>
        <div class="w-full bg-black/20 rounded-full h-3 overflow-hidden"><div id="progress-bar" class="bg-white h-full transition-all" style="width: 0%"></div></div>
      </div>

      <div id="scroll-container" class="flex-grow overflow-y-auto p-4 flex flex-col items-center">
        <div id="verhaal-tekst" class="text-center text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest"></div>
        <div id="vraag-container" class="mb-4 w-full flex justify-center"></div>
        <div id="antwoord-container" class="w-full max-w-md grid gap-2"></div>
        <div id="feedback-antwoord" class="hidden w-full max-w-md p-4 rounded-xl text-center font-black text-sm mt-4 border-4"></div>
      </div>

      <div class="p-4 bg-white border-t flex justify-center shrink-0">
        <button id="action-btn" onclick="volgendeActie()" class="w-full max-w-md bg-slate-200 text-slate-400 py-4 rounded-2xl font-black uppercase text-sm" disabled>Kies een antwoord...</button>
      </div>
    </div>

    <div id="bericht-scherm" class="hidden flex-grow flex-col h-full w-full items-center justify-center p-8 text-center overflow-y-auto">
        <div id="eind-emoji" class="text-7xl mb-4">🏆</div>
        <h2 id="eind-titel" class="text-4xl font-black text-slate-800 mb-2 italic uppercase">Aankomst Dover!</h2>
        <div class="bg-slate-900 text-white p-8 rounded-[3rem] mb-6 border-8 border-indigo-500 w-full max-w-sm">
            <div class="text-7xl font-black text-yellow-400 mb-2"><span id="eind-score-getal">0</span>%</div>
            <p id="eind-status" class="text-xs opacity-50 uppercase tracking-widest font-bold">Jouw Score</p>
        </div>
        
        <div class="bg-yellow-50 border-l-8 border-yellow-400 p-4 text-left mb-6 max-w-sm rounded-r-xl">
            <p class="font-black text-yellow-800 uppercase text-xs mb-1">📸 Screenshot Verplicht</p>
            <p class="text-xs text-yellow-900">Maak een screenshot van deze score voor Classroom.</p>
        </div>

        <div class="flex flex-col gap-3 w-full max-w-sm">
            <button id="remedie-btn" onclick="startRemediering()" class="hidden bg-red-500 text-white font-black py-4 px-10 rounded-full uppercase tracking-widest shadow-lg animate-pulse">Start Remediëring ✍️</button>
            <button onclick="window.location.reload()" class="bg-indigo-600 text-white font-black py-4 px-10 rounded-full uppercase tracking-widest">Opnieuw Starten</button>
        </div>
    </div>
  </div>

  <script>
    const theorieVragen = [
      { type: 'info', thema: 'De M-Check 🛠️', inhoud: `Controleer je fiets in een <strong>M-vorm</strong>: 1. Voorwiel → 2. Stuur → 3. Ketting → 4. Zadel → 5. Achterwiel.` },
      { type: 'quiz', q: "Waarmee begin je de M-check?", a: "Het voorwiel", opties: ["Het voorwiel", "Het zadel", "De ketting"], icoon: '🛠️', bg: 'bg-teal-600', landNaam: 'Voorbereiding' },
      { type: 'info', thema: 'Kledij & EHBO 🚑', inhoud: `Gebruik 3 lagen kledij. Bij een wonde: <strong>Eerst spoelen</strong> met water, dan ontsmetten.` },
      { type: 'quiz', q: "Wat doe je als eerste bij een schaafwonde?", a: "Spoelen met water", opties: ["Meteen ontsmetten", "Spoelen met water", "Niets doen"], icoon: '🛠️', bg: 'bg-teal-600', landNaam: 'Voorbereiding' }
    ];

    const onderdelen = [
      { nl: "de trapas", fr: "le boîtier de pédalier", en: "the bottom bracket", img: "trapas.png" },
      { nl: "de crank", fr: "la manivelle", en: "the crank arm", img: "cranck met pedaal.png" },
      { nl: "de standaard", fr: "la béquille", en: "the kickstand", img: "standaard.png" },
      { nl: "het spatbord", fr: "le garde-boue", en: "the mudguard", img: "spatbord.png" },
      { nl: "de fietsbel", fr: "la sonnette", en: "the bicycle bell", img: "fietsbel.png" },
      { nl: "de remgreep", fr: "le levier de frein", en: "the brake lever", img: "remgreep.png" },
      { nl: "het zadel", fr: "la selle", en: "the saddle", img: "zadel and zadelpen.png" },
      { nl: "de ketting", fr: "la chaîne", en: "the chain", img: "ketting.png" },
      { nl: "het ventiel", fr: "la valve", en: "the valve", img: "ventiel.png" },
      { nl: "de fietspomp", fr: "la pompe à vélo", en: "the bicycle pump", img: "pomp.png" }
    ];

    let state = { score: 0, index: 0, alleVragen: [], fouteVragen: [], isRemediering: false, beantwoord: false };

    function toggleSpiekbriefje() { document.getElementById('spiek-modal').classList.toggle('hidden'); }
    function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

    function startSpel() {
      state.alleVragen = [];
      theorieVragen.forEach(v => state.alleVragen.push(v));
      onderdelen.forEach(o => state.alleVragen.push({ type: 'quiz', q: "NL: Wat is dit?", a: o.nl, opties: shuffle([o.nl, "het stuur", "de bel", "de rem"]), img: o.img, icoon: '🇧🇪', bg: 'bg-slate-900', landNaam: 'België', code: 'BE' }));
      onderdelen.forEach(o => state.alleVragen.push({ type: 'quiz', q: "FR: Nommez la partie:", a: o.fr, opties: shuffle([o.fr, "le pneu", "le cadre", "la selle"]), img: o.img, icoon: '🇫🇷', bg: 'bg-blue-700', landNaam: 'Frankrijk', code: 'FR' }));
      onderdelen.forEach(o => state.alleVragen.push({ type: 'quiz', q: "EN: Name the part:", a: o.en, opties: shuffle([o.en, "the wheel", "the chain", "the gear"]), img: o.img, icoon: '🇬🇧', bg: 'bg-red-600', landNaam: 'Engeland', code: 'EN' }));
      
      document.getElementById('start-scherm').classList.add('hidden');
      document.getElementById('game-ui').classList.remove('hidden');
      laadVraag();
    }

    function laadVraag() {
      state.beantwoord = false;
      let v = state.alleVragen[state.index];
      
      if (state.index > 0 && v.code !== state.alleVragen[state.index-1].code && !state.isRemediering) {
        document.getElementById('etappe-scherm').classList.remove('hidden');
        document.getElementById('volgende-land-naam').innerText = v.landNaam;
        return;
      }

      document.getElementById('land-icoon').innerText = v.icoon;
      document.getElementById('land-naam').innerText = v.landNaam;
      document.getElementById('game-header').className = `p-3 text-white flex flex-col gap-2 shrink-0 ${v.bg}`;
      document.getElementById('progress-bar').style.width = `${(state.index / state.alleVragen.length) * 100}%`;
      document.getElementById('score-weergave').innerText = state.score;

      const cont = document.getElementById('vraag-container');
      const ansCont = document.getElementById('antwoord-container');
      cont.innerHTML = ''; ansCont.innerHTML = '';
      document.getElementById('feedback-antwoord').classList.add('hidden');

      if (v.type === 'info') {
        cont.innerHTML = `<div class='bg-white p-6 rounded-2xl border-4 border-teal-500 w-full'><h3 class='font-black text-teal-600 mb-2'>${v.thema}</h3><p class='text-sm'>${v.inhoud}</p></div>`;
        ansCont.innerHTML = `<button onclick="volgendeActie()" class="bg-teal-600 text-white py-4 rounded-xl font-black uppercase">Begrepen!</button>`;
        document.getElementById('action-btn').classList.add('hidden');
      } else {
        document.getElementById('action-btn').classList.remove('hidden');
        document.getElementById('verhaal-tekst').innerText = v.q;
        if(v.img) cont.innerHTML = `<img src="${v.img}" class="max-h-32 rounded-lg" onerror="this.outerHTML='<p class=text-xs>[Afbeelding ${v.img}]</p>'">`;
        v.opties.forEach(o => {
          let b = document.createElement('button');
          b.className = "bg-white p-4 rounded-xl font-bold border-2 border-slate-200 text-slate-700 text-left";
          b.innerText = o;
          b.onclick = () => { if(!state.beantwoord) check(o, b, v); };
          ansCont.appendChild(b);
        });
        document.getElementById('action-btn').disabled = true;
        document.getElementById('action-btn').innerText = "Kies een antwoord...";
      }
    }

    function check(gekozen, btn, v) {
      state.beantwoord = true;
      const fb = document.getElementById('feedback-antwoord');
      fb.classList.remove('hidden');
      if (gekozen === v.a) {
        state.score++;
        btn.className = "bg-green-100 p-4 rounded-xl font-bold border-4 border-green-500 text-green-700 text-left";
        fb.innerText = "Correct! ✅";
        fb.className = "w-full max-w-md p-4 rounded-xl text-center font-black text-sm mt-4 border-4 bg-green-50 border-green-500 text-green-700";
        confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 } });
      } else {
        state.fouteVragen.push(v);
        btn.className = "bg-red-100 p-4 rounded-xl font-bold border-4 border-red-500 text-red-700 text-left";
        fb.innerText = `Fout! Het was: ${v.a}`;
        fb.className = "w-full max-w-md p-4 rounded-xl text-center font-black text-sm mt-4 border-4 bg-red-50 border-red-500 text-red-700";
      }
      document.getElementById('action-btn').disabled = false;
      document.getElementById('action-btn').innerText = "Volgende Km 👉";
    }

    function startVolgendeEtappe() {
      document.getElementById('etappe-scherm').classList.add('hidden');
      laadVraag();
    }

    function volgendeActie() {
      state.index++;
      if (state.index >= state.alleVragen.length) eindigSpel();
      else laadVraag();
    }

    function eindigSpel() {
      document.getElementById('game-ui').classList.add('hidden');
      document.getElementById('bericht-scherm').classList.remove('hidden');
      let perc = Math.round((state.score / state.alleVragen.length) * 100);
      document.getElementById('eind-score-getal').innerText = perc;
      
      if (perc >= 90) {
          document.getElementById('eind-titel').innerText = "🥇 Fietsexpert!";
          document.getElementById('eind-emoji').innerText = "🌟";
          document.getElementById('eind-status').innerText = "Geweldige prestatie!";
          confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
      }

      if (perc < 100) {
          document.getElementById('remedie-btn').classList.remove('hidden');
      }
    }

    function startRemediering() {
      state.alleVragen = [...state.fouteVragen];
      state.fouteVragen = [];
      state.index = 0; state.score = 0;
      state.isRemediering = true;
      document.getElementById('bericht-scherm').classList.add('hidden');
      document.getElementById('remedie-btn').classList.add('hidden');
      document.getElementById('game-ui').classList.remove('hidden');
      laadVraag();
    }
  </script>
</body>
</html>
